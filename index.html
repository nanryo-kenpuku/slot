<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ドリンク・スロット</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <link rel="icon" href="./favicon.png" type="image/x-icon">

    <style>
        /* 全体の背景：空のような明るい水色から薄い黄色へのグラデーション */
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Arial Black', sans-serif;
            background: linear-gradient(135deg, #fff9c4, #b3e5fc);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            box-sizing: border-box;
        }

        /* コンテナ：角丸で、おもちゃ箱のような温かい雰囲気 */
        .container {
            background: #ffffff;
            padding: 25px;
            padding-bottom: 100px;
            border-radius: 35px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            text-align: center;
            width: 100%;
            max-width: 500px;
            border: 6px solid #ffeb3b;
            /* 明るい黄色の縁取り */
        }

        h1 {
            color: #f57c00;
            font-size: 32px;
            margin: 5px 0;
            text-shadow: 1px 1px #fff;
        }

        /* スロット窓：ワクワクするオレンジベース */
        #slot-display {
            background: #fff3e0;
            color: #e65100;
            font-size: 30px;
            font-weight: bold;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 6px solid #ffb74d;
            border-radius: 25px;
            margin: 20px 0;
            box-shadow: inset 0 4px 0 rgba(255, 255, 255, 0.5);
        }

        /* 楽しいボタン：クリックしたくなる立体感 */
        .btn {
            cursor: pointer;
            border: none;
            font-weight: bold;
            border-radius: 50px;
            padding: 20px;
            width: 100%;
            font-size: 24px;
            color: white;
            box-shadow: 0 8px #d84315;
            transition: transform 0.1s;
        }

        .btn:active {
            transform: translateY(4px);
            /*押されている風*/
        }

        .btn:disabled {
            background-color: #bdbdbd !important;
            /* グレー */
            box-shadow: 0 8px #757575 !important;
            /* 影も暗く */
            cursor: not-allowed;
            /* 禁止マークのカーソル */
            transform: none;
            /* 押し込みアニメーションを無効化 */
        }

        #main-btn {
            background-color: #ff9800;
        }

        #main-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px #d84315;
        }

        .stop-style {
            background-color: #f44336 !important;
            box-shadow: 0 8px #b71c1c !important;
        }

        #hit-btn {
            background-color: #FF69B4;
        }

        #hit-btn:active {
            transform: translateY(8px);
            /* 押し込みを深く */
            box-shadow: 0 2px #C2185B;
        }

        /* 大当たり用オーバーレイのスタイル */
        #overlay {
            display: none;
            /* 初期状態は非表示 */
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;

            background-size: cover;
            /* 画像を画面全体にフィットさせる */
            background-position: center;
            /* 画像を中央に配置 */
            color: white;
            font-size: 10vw;
            /* 画面幅に応じたサイズ */
            font-weight: bold;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: pointer;
        }

        .overlay-ooatari {
            background-image: url('./1064898.jpg') !important;
        }

        .overlay-omake {
            background-image: none !important;
            background: rgba(0, 0, 0, 0.9) !important;
            /* グレー */
        }

        /* ローディング画面 */
        #loading {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.7);
            z-index: 9999;

            justify-content: center;
            align-items: center;
        }

        /* クルクル */
        .spinner {
            width: 70px;
            height: 70px;
            border: 8px solid #E3F2FD;
            border-top: 8px solid #2196F3;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<div id="loading">
    <div class="spinner"></div>
</div>

<body>

    <div class="container">
        <img src="./emblem.jpg" width="50%" height="50%">
        <br />
        <label style="font-weight: bold; color: #555; cursor: pointer; font-size: 32px;">
            横浜南陵高校<br />健康福祉グループ
        </label>
        <h1 id="slot-title">ドリンク・スロット</h1>


        <!-- overlayの中を以下のように修正 -->
        <div id="overlay">
            <div style="text-align: center;">
                <!-- 追加：メッセージ用の要素 -->
                <p id="overlay-message"
                    style="font-size: 24px; margin-bottom: 20px; color: #fff; text-shadow: 2px 2px 4px #000;">
                    お店の人に見せてね
                </p>
                <button id="hit-btn" class="btn" onclick="closeButton()"></button>
            </div>
        </div>

        <div id="slot-display">READY?</div>
        <button id="main-btn" class="btn" onclick="toggleSlot()">スタート！</button>

        <script>

            let drinkAllItems = [];
            let jellyAllItems = [];
            let allItems = [];
            let soundOff = [];
            let retrySpan = [];
            let ooatari = [];
            let ooatariPercent = [];
            let omake = [];
            let omakePercent = [];

            $(function () {
                showLoading();//ローディング
                $.getJSON(
                    "https://slot-nanryo-default-rtdb.firebaseio.com/config.json",
                    function (config) {

                        //drinkAllItems = config.drinkEnabledItems;
                        //jellyAllItems = config.jellyEnabledItems;
                        drinkAllItems = (config.drinkEnabledItems || []).filter(item => item && item.length > 0);
                        jellyAllItems = (config.jellyEnabledItems || []).filter(item => item && item.length > 0);

                        // 1. 両方の配列を結合して allItems を作成
                        allItems = [...drinkAllItems, ...jellyAllItems];
                        // 2. allItems をランダムにシャッフルする（Fisher-Yatesシャッフル）
                        for (let i = allItems.length - 1; i > 0; i--) {
                            const j = Math.floor(Math.random() * (i + 1));
                            [allItems[i], allItems[j]] = [allItems[j], allItems[i]];
                        }
                        soundOff = config.soundOff;
                        retrySpan = config.retrySpan;
                        ooatari = config.ooatari;
                        ooatariPercent = config.ooatariPercent;
                        omake = config.omake;
                        omakePercent = config.omakePercent;

                    }
                ).always(function () {
                    hideLoading();
                    //選択画面表示
                    //document.getElementById('select-overlay').style.display = 'flex';
                    //チケット受け取り
                    document.getElementById('ticket-overlay').style.display = 'flex';
                    // 状態チェック
                    blockButton();
                });
            });

            let isSpinning = false;
            let slotInterval;

            function toggleSlot() {
                const mainBtn = document.getElementById('main-btn');
                // 追加：ボタンが「もう一回チャレンジ」状態ならチケット画面へ戻す
                if (mainBtn.textContent === "もう一回チャレンジ") {
                    document.getElementById('ticket-overlay').style.display = 'flex';
                    mainBtn.textContent = "スタート！"; // 次回のために戻しておく
                    return;
                }

                if (!isSpinning) {
                    isSpinning = true;
                    mainBtn.textContent = "ストップ！";

                    //タップ音
                    playSound('tick');
                    mainBtn.classList.add("stop-style");

                    slotInterval = setInterval(() => {
                        const randomIndex = Math.floor(Math.random() * allItems.length);
                        const item = allItems[randomIndex];
                        const display = document.getElementById('slot-display');

                        // 表示内容を反映
                        display.innerHTML = item;

                        if (item.length > 10) {
                            display.style.fontSize = "20px"; // 長い場合
                        } else if (item.length > 6) {
                            display.style.fontSize = "25px"; // 普通の場合
                        } else {
                            display.style.fontSize = "35px"; // 短い場合
                        }
                        //ルーレット音
                        playSound('');

                    }, 80);//文字の変わるスピード

                } else {
                    clearInterval(slotInterval);
                    isSpinning = false;
                    //もう一回の間隔（ミリ秒　×　指定時間）
                    const endTime = Date.now() + (1000 * retrySpan);
                    localStorage.setItem('blockEndTime', endTime);

                    blockButton(); // ボタンを非活性化する関数へ

                    if ((ooatari == true && Math.random() < (ooatariPercent / 100))) {
                        // 大当たりの場合、
                        overlay.className = 'overlay-ooatari'; // 背景キラキラ
                        document.getElementById('hit-btn').textContent = "大当たり！！";
                        overlay.style.display = 'flex';
                    } else if ((omake == true && Math.random() < (omakePercent / 100))) {
                        // おまけの場合、
                        overlay.className = 'overlay-omake'; // 背景グレー
                        document.getElementById('hit-btn').textContent = "おまけがもらえるよ";
                        overlay.style.display = 'flex';
                    }
                    confetti({
                        particleCount: 100, // 粒子を増やす
                        spread: 100,        // 広がりを大きく
                        origin: { y: 0.6 }
                    });
                    confetti({
                        particleCount: 100,
                        angle: 60,
                        scalar: 1.2,        // 紙吹雪の大きさ
                        spread: 55,
                        origin: { x: 0, y: 0.6 } // 左下から
                    });
                    confetti({
                        particleCount: 100,
                        angle: 120,
                        scalar: 1.2,        // 紙吹雪の大きさ
                        spread: 55,
                        origin: { x: 1, y: 0.6 } // 右下から
                    });
                    confetti({
                        particleCount: 200,
                        scalar: 1.2,        // 紙吹雪の大きさ
                        spread: 100,        // 広がりを大きく
                        shapes: ['square', 'circle', 'star', 'heart'], // これらをランダムに混ぜる
                        colors: ['#FFE400', '#FFBD00', '#E89400', '#FFCA6C', '#FDFFB8']
                    });
                }
            }

            let audioCtx;
            function playSound(type) {
                if (soundOff == true) {
                    return;
                }
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                if (type === 'tick') {
                    osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.05);
                } else {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(523, audioCtx.currentTime);
                    //osc.frequency.setValueAtTime(400 + (Math.random() * 400), audioCtx.currentTime);//リズム変化
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.5);
                }
            }

            function closeButton() {
                //もう一回の間隔（ミリ秒　×　指定時間）
                const endTime = Date.now() + (1000 * retrySpan);
                localStorage.setItem('blockEndTime', endTime);

                blockButton(); // ボタンを非活性化する関数へ
                overlay.style.display = 'none';
            };

            function showLoading() {
                $("#loading").css("display", "flex");
            }

            function hideLoading() {
                $("#loading").hide();
            }
            function selectCategory(type) {

                const slotTitle = document.getElementById('slot-title');

                if (type === 'jelly') {
                    slotTitle.textContent = "ゼリー・スロット";
                    allItems = jellyAllItems;
                } else if (type === 'drink') {
                    slotTitle.textContent = "ドリンク・スロット";
                    allItems = drinkAllItems;
                } else {
                    // 'all' の場合
                    slotTitle.textContent = "ランダム・スロット";
                    allItems = [...drinkAllItems, ...jellyAllItems];
                    for (let i = allItems.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [allItems[i], allItems[j]] = [allItems[j], allItems[i]];
                    }
                }

                if (allItems.length === 0) {
                    alert("売り切れです。ごめんなさい！！");
                    return;
                } else {
                    const slotDisplay = document.getElementById('slot-display');
                    slotDisplay.textContent = "READY?";
                    document.getElementById('select-overlay').style.display = 'none';
                }
            }
            function selectTicket() {
                document.getElementById('ticket-overlay').style.display = 'none';
                document.getElementById('select-overlay').style.display = 'flex';

            }

            function blockButton() {
                const mainBtn = document.getElementById('main-btn');
                const endTime = localStorage.getItem('blockEndTime');
                const now = Date.now();

                if (endTime && now < endTime) {
                    // まだ経過していない場合
                    mainBtn.disabled = true;
                    mainBtn.textContent = "またチャレンジしてね";
                    // 残り時間後に再度チェックして有効化する
                    setTimeout(blockButton, endTime - now);
                } else {
                    // 経過している（またはタイマー設定がない）場合
                    mainBtn.disabled = false;
                    mainBtn.textContent = "スタート！";
                    mainBtn.classList.remove("stop-style");
                    localStorage.removeItem('blockEndTime'); // 不要になったので削除
                    //チケット画面を出す
                    //あたり画面が出ていなかったら、再チャレンジボタンにする
                    if (document.getElementById('overlay').style.display == 'none') {
                        mainBtn.disabled = false;
                        mainBtn.textContent = "もう一回チャレンジ";
                        mainBtn.classList.remove("stop-style");

                    }
                }
            }
            // スライダーの初期化をDOM構築完了後に実行する
            window.addEventListener('DOMContentLoaded', (event) => {
                const knob = document.getElementById('slider-knob');
                const track = document.getElementById('slider-track');

                // 要素が存在する場合のみ処理を行うようにチェックを入れる
                if (!knob || !track) return;

                let isDragging = false;

                // 共通の移動処理関数
                function handleMove(clientX) {
                    if (!isDragging) return;
                    const trackRect = track.getBoundingClientRect();
                    let newLeft = clientX - trackRect.left - 30;

                    if (newLeft < 0) newLeft = 0;
                    if (newLeft > trackRect.width - 60) {
                        newLeft = trackRect.width - 60;
                        selectTicket();
                        isDragging = false;
                        knob.style.left = '0px';
                        return;
                    }
                    knob.style.left = newLeft + 'px';
                }

                // イベントリスナーの登録
                knob.addEventListener('mousedown', () => isDragging = true);
                document.addEventListener('mousemove', (e) => handleMove(e.clientX));
                document.addEventListener('mouseup', () => { isDragging = false; knob.style.left = '0px'; });

                knob.addEventListener('touchstart', (e) => { isDragging = true; });
                document.addEventListener('touchmove', (e) => {
                    handleMove(e.touches[0].clientX);
                    e.preventDefault();
                }, { passive: false });
                document.addEventListener('touchend', () => { isDragging = false; knob.style.left = '0px'; });
            });

        </script>
</body>
<!-- 選択画面用オーバーレイ -->
<div id="select-overlay"
    style="display: flex; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.95); z-index: 10000; flex-direction: column; justify-content: center; align-items: center; gap: 20px;">
    <h2 style="color:white;">どれにする？</h2>
    <button class="btn" style="width: 200px; background: #f385db;box-shadow: 0 8px #686767;"
        onclick="selectCategory('jelly')">ゼリー</button>
    <button class="btn" style="width: 200px; background: #2196F3;box-shadow: 0 8px #686767;"
        onclick="selectCategory('drink')">ペットボトル</button>
    <button class="btn" style="width: 200px; background: #FF9800;box-shadow: 0 8px #686767;"
        onclick="selectCategory('all')">ランダム</button>
</div>
<div id="ticket-overlay"
    style="display: flex; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.95); z-index: 10000; flex-direction: column; justify-content: center; align-items: center; gap: 20px;">
    <h2 style="color:white;">チケットを渡してね</h2>
    <div id="slider-track"
        style="width: 250px; height: 60px; background: #333; border-radius: 30px; position: relative; overflow: hidden; border: 2px solid #fff;">
        <div id="slider-knob"
            style="width: 60px; height: 60px; background: #4CAF50; border-radius: 50%; position: absolute; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;">
            ≫</div>
        <span
            style="position: absolute; width: 100%; text-align: center; line-height: 60px; color: #888; pointer-events: none;" />
    </div>
</div>


</html>
