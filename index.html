<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>文化祭スロット・ルーレット</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #2f3542; display: flex; flex-direction: column; align-items: center; padding: 20px; color: white; }
        .container { background: #57606f; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 100%; max-width: 500px; }
        /* スロット窓のスタイル */
        #slot-display { 
            background: #2f3542; 
            color: #ffa502; 
            font-size: 32px; 
            font-weight: bold; 
            height: 100px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 5px solid #ffa502; 
            border-radius: 10px; 
            margin: 20px 0;
            overflow: hidden;
            text-shadow: 0 0 10px #ffa502;
        }
        button { font-size: 20px; padding: 15px 30px; margin: 10px; cursor: pointer; border-radius: 10px; border: none; font-weight: bold; }
        #start-btn { background-color: #2ed573; color: white; }
        #reset-btn { background-color: #ff4757; color: white; }
        textarea { width: 100%; height: 150px; margin-top: 10px; border-radius: 5px; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>ドリンク・スロット</h1>
    <div id="slot-display">READY</div>
    <button id="start-btn" onclick="startSlot()">スタート！</button>
    <button id="reset-btn" onclick="resetSlot()">リセット</button>

    <div style="text-align: left; margin-top: 20px;">
        <label>商品リスト（編集可能）：</label>
        <textarea id="item-input">コカ・コーラ
キリンレモン
カルピスウォーター
ミニッツメイドQoo りんご
ファンタ グレープ
ファンタ オレンジ
バヤリース オレンジ
メロンソーダ
午後の紅茶 レモン
午後の紅茶 ミルクティー
午後の紅茶 ストレート
伊藤園 健康ミネラルむぎ茶
伊藤園 おーいお茶緑茶</textarea>
    </div>
</div>

<script>
    let isSpinning = false;
    let slotInterval;

    function startSlot() {
        if (isSpinning) return;
        isSpinning = true;
        
        const items = document.getElementById('item-input').value.split('\n').filter(i => i.trim() !== "");
        const display = document.getElementById('slot-display');
        let count = 0;

        // 高速スクロール演出
        slotInterval = setInterval(() => {
            const randomIndex = Math.floor(Math.random() * items.length);
            display.textContent = items[randomIndex];
            
            // 少しずつ速度を落とすための変数
            count++;
            if (count > 30) { // 30回切り替わったら停止
                clearInterval(slotInterval);
                isSpinning = false;
                // 当選演出
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }
        }, 80);
    }

    function resetSlot() {
        clearInterval(slotInterval);
        isSpinning = false;
        document.getElementById('slot-display').textContent = "READY";
    }
</script>
</body>
</html>
